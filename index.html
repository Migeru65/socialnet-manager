<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SocialNet Manager</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <link rel="stylesheet" href="css/style.css" />

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <header id="app-header" class="bg-primary text-white p-3">
      <h1 id="app-title" class="h4 mb-0">
        LBYCPG3 SocialNet App - Profile Manager
      </h1>
    </header>

    <div id="app-wrapper">
      <main class="container-fluid flex-grow-1 py-3">
        <div class="row g-3 h-100">
          <div class="col-12 col-md-4">
            <div class="sn-panel">
              <h6 class="fw-bold text-primary border-bottom pb-2 mb-3">
                PROFILE MANAGEMENT
              </h6>

              <label class="form-label fw-semibold small"
                >Add/Lookup Profile:</label
              >
              <div class="input-group mb-3">
                <input
                  type="text"
                  id="input-name"
                  class="form-control form-control-sm"
                  placeholder="Enter profile name"
                />
                <button id="btn-add" class="btn btn-primary btn-sm">Add</button>
                <button id="btn-lookup" class="btn btn-outline-primary btn-sm">
                  Lookup
                </button>
              </div>

              <button id="btn-delete" class="btn btn-danger btn-sm w-100 mb-3">
                Delete Selected Profile
              </button>

              <p class="small fw-semibold text-muted mb-1">Profiles</p>
              <div id="profile-list" class="profile-list-box"></div>
            </div>
          </div>

          <div class="col-12 col-md-4">
            <div class="sn-panel text-center">
              <h6 class="fw-bold text-primary border-bottom pb-2 mb-3">
                PROFILE INFORMATION
              </h6>

              <img
                id="profile-pic"
                src="resources/images/default.png"
                alt="Profile picture"
                class="profile-thumb img-fluid rounded-circle border border-primary border-2 mb-3"
              />

              <h5 id="profile-name" class="fw-bold mb-3">
                No Profile Selected
              </h5>

              <p class="small fw-semibold text-muted mb-1 text-start">
                Current Status:
              </p>
              <div class="text-start mb-3">
                <span id="profile-status" class="badge bg-primary fs-6"
                  >&mdash;</span
                >
              </div>

              <p class="small fw-semibold text-muted mb-1 text-start">
                Favorite Quote:
              </p>
              <blockquote
                id="profile-quote"
                class="blockquote fst-italic text-start fs-6 border-start border-3 ps-3 mb-3"
              >
                &mdash;
              </blockquote>

              <p class="small fw-semibold text-start text-muted mb-1">
                Friends
              </p>
              <div id="friends-list" class="sn-textbox sn-textbox--tall"></div>
            </div>
          </div>

          <div class="col-12 col-md-4">
            <div class="sn-panel">
              <h6 class="fw-bold text-primary border-bottom pb-2 mb-3">
                EDIT PROFILE
              </h6>

              <label class="form-label fw-semibold small">Change Status:</label>
              <div class="input-group mb-3">
                <input
                  type="text"
                  id="input-status"
                  class="form-control form-control-sm"
                  placeholder="New status message"
                />
                <button id="btn-status" class="btn btn-primary btn-sm">
                  Update Status
                </button>
              </div>

              <label class="form-label fw-semibold small"
                >Change Favorite Quote:</label
              >
              <div class="input-group mb-3">
                <input
                  type="text"
                  id="input-quote"
                  class="form-control form-control-sm"
                  placeholder="Enter favorite quote"
                />
                <button id="btn-quote" class="btn btn-primary btn-sm">
                  Update Quote
                </button>
              </div>

              <label class="form-label fw-semibold small"
                >Change Picture:</label
              >
              <div class="input-group mb-3">
                <input
                  type="text"
                  id="input-picture"
                  class="form-control form-control-sm"
                  placeholder="e.g. resources/images/ada.png"
                />
                <button id="btn-picture" class="btn btn-secondary btn-sm">
                  Update Picture
                </button>
              </div>

              <label class="form-label fw-semibold small"
                >Manage Friends:</label
              >
              <div class="input-group mb-3">
                <input
                  type="text"
                  id="input-friend"
                  class="form-control form-control-sm"
                  placeholder="Friend's full name"
                />
                <button id="btn-add-friend" class="btn btn-success btn-sm">
                  Add Friend
                </button>
                <button id="btn-remove-friend" class="btn btn-warning btn-sm">
                  Remove
                </button>
              </div>

              <button id="btn-exit" class="btn btn-dark btn-sm w-100 mt-auto">
                Exit
              </button>
            </div>
          </div>
        </div>
      </main>

      <footer id="status-bar" class="alert-info rounded-0 mb-0">
        <span id="status-message">Ready. Select a profile from the list.</span>
      </footer>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <script src="js/app.js"></script>
  </body>
</html>
