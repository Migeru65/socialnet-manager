<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SocialNet Manager</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css" />

    <!-- Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <!-- Header -->
    <header id="app-header">
      <h1 id="app-title">LBYCPG3 SocialNet App - Profile Manager</h1>
    </header>

    <div id="app-wrapper">
      <main class="container-fluid flex-grow-1 py-3 px-4">
        <div class="row g-4 h-100">
          
          <!-- ===== LEFT PANEL: Profile Management ===== -->
          <div class="col-12 col-md-4 d-flex">
            <div class="sn-panel">
              <h6 class="fw-bold sn-text-blue border-bottom pb-2 mb-3 panel-heading">PROFILE MANAGEMENT</h6>

              <label class="form-label fw-semibold mb-1 sn-label">Add/Lookup Profile:</label>
              <input type="text" id="input-name" class="form-control mb-3" placeholder="Enter profile name">
              
              <div class="d-flex gap-2 mb-4">
                <button id="btn-add" class="btn sn-btn-blue flex-grow-1 fw-semibold">Add</button>
                <button id="btn-lookup" class="btn sn-btn-blue flex-grow-1 fw-semibold">Lookup</button>
                <button id="btn-delete" class="btn sn-btn-red flex-grow-1 fw-semibold">Delete</button>
              </div>

              <label class="form-label fw-semibold mb-1 sn-label">All Profiles:</label>
              <div id="profile-list" class="profile-list-box">
                <!-- Dynamically populated by JavaScript -->
              </div>
            </div>
          </div>

          <!-- ===== CENTER PANEL: Profile Information ===== -->
          <div class="col-12 col-md-4 d-flex">
            <div class="sn-panel">
              <h6 class="fw-bold sn-text-blue border-bottom pb-2 mb-4 panel-heading">PROFILE INFORMATION</h6>

              <div class="d-flex align-items-center mb-4 px-2">
                <img id="profile-pic" src="resources/images/default.png" alt="Profile picture" class="profile-thumb rounded-circle border border-primary border-3 shadow-sm">
                <h3 id="profile-name" class="fw-bold ms-4 mb-0 profile-hero-name">No Profile Selected</h3>
              </div>

              <label class="form-label fw-semibold mb-1 sn-label">Current Status:</label>
              <div id="profile-status" class="sn-textbox mb-3">&mdash;</div>

              <label class="form-label fw-semibold mb-1 sn-label">Favorite Quote:</label>
              <div id="profile-quote" class="sn-textbox mb-3">&mdash;</div>

              <label class="form-label fw-semibold mb-1 sn-label">Friends:</label>
              <div id="friends-list" class="sn-textbox sn-textbox--tall">
                <!-- Dynamically populated by JavaScript -->
              </div>
            </div>
          </div>

          <!-- ===== RIGHT PANEL: Edit Profile ===== -->
          <div class="col-12 col-md-4 d-flex">
            <div class="sn-panel">
              <h6 class="fw-bold sn-text-blue border-bottom pb-2 mb-3 panel-heading">EDIT PROFILE</h6>

              <label class="form-label fw-semibold mb-1 sn-label">Change Status:</label>
              <input type="text" id="input-status" class="form-control mb-2" placeholder="Enter new status">
              <button id="btn-status" class="btn sn-btn-blue w-100 fw-semibold mb-4">Update Status</button>

              <label class="form-label fw-semibold mb-1 sn-label">Change Favorite Quote:</label>
              <input type="text" id="input-quote" class="form-control mb-2" placeholder="Enter favorite quote">
              <button id="btn-quote" class="btn sn-btn-blue w-100 fw-semibold mb-4">Update Quote</button>

              <label class="form-label fw-semibold mb-1 sn-label">Change Picture:</label>
              <input type="text" id="input-picture" class="form-control mb-2" placeholder="Enter image filename">
              <button id="btn-picture" class="btn sn-btn-blue w-100 fw-semibold mb-4">Update Picture</button>

              <label class="form-label fw-semibold mb-1 sn-label">Manage Friends:</label>
              <input type="text" id="input-friend" class="form-control mb-2" placeholder="Enter friend's name">
              <div class="d-flex gap-2 mb-4">
                <button id="btn-add-friend" class="btn sn-btn-green flex-grow-1 fw-semibold">Add Friend</button>
                <button id="btn-remove-friend" class="btn sn-btn-orange flex-grow-1 fw-semibold">Remove</button>
              </div>

              <div class="mt-auto">
                <button id="btn-exit" class="btn sn-btn-dark w-100 fw-semibold py-2">Exit</button>
              </div>
            </div>
          </div>

        </div>
      </main>

      <!-- ===== Status Bar ===== -->
      <footer id="status-bar">
        <span id="status-message">Ready. Select a profile from the list.</span>
      </footer>
    </div>

    <!-- Bootstrap JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    
    <!-- Application Logic -->
    <script src="js/app.js"></script>
  </body>
</html>
